version: '3.9'

services:
  # ─── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: vicharanshala_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       vicharanshala_db
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vicharanshala_net

  # ─── Backend API ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vicharanshala_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV:            production
      PORT:                5000
      DB_HOST:             postgres
      DB_PORT:             5432
      DB_NAME:             vicharanshala_db
      DB_USER:             postgres
      DB_PASSWORD:         ${DB_PASSWORD:-changeme}
      JWT_SECRET:          ${JWT_SECRET:-change_me_in_production_min_32_chars}
      JWT_REFRESH_SECRET:  ${JWT_REFRESH_SECRET:-change_refresh_secret_here}
      JWT_EXPIRES_IN:      7d
      JWT_REFRESH_EXPIRES_IN: 30d
      CLIENT_URL:          ${CLIENT_URL:-http://localhost:5173}
      GOOGLE_CLIENT_ID:    ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET:${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:5000/api/auth/google/callback}
      SMTP_HOST:           ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT:           ${SMTP_PORT:-587}
      SMTP_USER:           ${SMTP_USER:-}
      SMTP_PASS:           ${SMTP_PASS:-}
      EMAIL_FROM:          ${EMAIL_FROM:-Vicharanshala Lab <noreply@vicharanshala.iitropar.ac.in>}
      ANTHROPIC_API_KEY:   ${ANTHROPIC_API_KEY:-}
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX:       100
    ports:
      - "5000:5000"
    volumes:
      - ./backend/logs:/app/logs
    networks:
      - vicharanshala_net

  # ─── Frontend ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: vicharanshala_web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - vicharanshala_net

volumes:
  postgres_data:
    driver: local

networks:
  vicharanshala_net:
    driver: bridge
